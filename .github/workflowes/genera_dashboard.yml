name: Genera Dashboard FPS

on:
  push:
    paths:
      - '*.xlsx'
      - 'genera_dashboard.py'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dipendenze
        run: pip install pandas openpyxl

      - name: Genera dashboard HTML
        run: python genera_dashboard.py

      - name: Commit e push docs/index.html
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "Dashboard aggiornata automaticamente $(date '+%d/%m/%Y %H:%M')"
          git push
